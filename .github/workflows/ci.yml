name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          stellar-insured-contracts/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('stellar-insured-contracts/**/Cargo.lock') }}
    
    - name: Add WASM target
      run: rustup target add wasm32-unknown-unknown
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Run workspace tests
      run: cargo test --workspace
    
    - name: Run PropertyToken unit tests
      working-directory: stellar-insured-contracts/contracts/property-token
      run: cargo test --lib

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --workspace || true

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          manifest-path: stellar-insured-contracts/Cargo.toml
        continue-on-error: true

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo-contract
        run: cargo install cargo-contract --locked

      - name: Build workspace contracts
        run: |
          for pkg in contracts/traits contracts/proxy contracts/insurance contracts/property-token contracts/analytics contracts/fees contracts/compliance_registry contracts/fractional; do
            echo "Building $pkg..."
            cd "$pkg"
            cargo contract build --release || true
            cd ../..
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts
          path: |
            stellar-insured-contracts/contracts/*/target/ink/*.contract
            stellar-insured-contracts/contracts/*/target/ink/*.wasm

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate documentation
        run: cargo doc --all-features --no-deps

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: stellar-insured-contracts/target/doc
