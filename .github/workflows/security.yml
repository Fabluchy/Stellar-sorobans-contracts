name: Security Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  automated-security-pipeline:
    name: Automated Security Pipeline
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Install cargo-audit & cargo-deny
      run: |
        cargo install cargo-audit
        cargo install cargo-deny

    - name: Build Security Audit Tool
      run: |
        cargo build --release -p security-audit
        cp target/release/security-audit ./security-audit-tool

    - name: Run cargo-deny check
      continue-on-error: true
      run: cargo deny check --config deny.toml

    - name: Proptest Fuzzing
      run: cargo test --workspace --features fuzzing || true
      continue-on-error: true

    - name: Run Security Audit Pipeline
      run: |
        ./security-audit-tool audit --report security-report.json

    - name: Display Security Report
      run: |
        cat security-report.json

    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: stellar-insured-contracts/security-report.json

  formal-verification:
    name: Formal Verification (Kani)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Kani
      run: |
        cargo install --locked kani-verifier
        cargo kani setup

    - name: Run Kani Verification
      run: |
        cd contracts/property-token
        cargo kani || true

  regression-testing:
    name: Regression Testing
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: stellar-insured-contracts
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Run Tests
      run: cargo test --workspace || true

  dependency-check:
    name: Dependency & Container Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'stellar-insured-contracts'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
